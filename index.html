<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Clock - Smart Time Tracking</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle, #0a2d5e 0%, #011f4b 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .clock-font { font-family: 'DM Serif Display', serif; }
        .glass { 
            background: #f1f8fe; 
            border-radius: 4rem; 
            box-shadow: 0 0 80px 10px rgba(0, 146, 241, 0.3);
            position: relative;
        }
        .status-card { background-color: #b3cde0; border-radius: 2rem; }
        .hidden { display: none; }
        
        .back-btn {
            position: absolute;
            left: -80px;
            top: 20px;
            background: #b3cde0;
            padding: 15px;
            border-radius: 50%;
            color: #011f4b;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="p-4">

    <div class="relative">
        <button id="btnBack" onclick="resetUI()" class="back-btn hidden hover:scale-110 transition-transform">
            <i data-lucide="undo-2"></i>
        </button>

        <div class="glass p-12 w-full max-w-md text-center">
            
            <div class="mb-6">
                <span class="bg-[#7ba4c4] text-[#011f4b] text-[12px] font-bold px-4 py-1.5 rounded-full uppercase tracking-tight opacity-80">
                    O'Clock: Time Station
                </span>
                <div id="clock" class="clock-font text-7xl text-[#1a1a1a] mt-4">00:00:00</div>
                <p id="dateText" class="text-[#7ba4c4] text-xs mt-2 uppercase font-bold tracking-[0.2em]"></p>
            </div>

            <div id="screenLogin">
                <h2 class="text-[#1e3a8a] font-extrabold text-lg mb-6">Enter your credentials:</h2>
                
                <div class="relative mb-3 flex items-center">
                    <i data-lucide="user" class="absolute left-6 w-5 h-5 text-[#1e3a8a]"></i>
                    <input type="number" id="funcId" placeholder="ID" style="background-color: #b3cde0;"
                           class="w-full p-4 pl-14 rounded-full text-left text-lg font-bold text-slate-800 outline-none placeholder:text-[#5c7da0] placeholder:italic">
                </div>

                <div class="relative mb-8 flex items-center">
                    <i data-lucide="lock" class="absolute left-6 w-5 h-5 text-[#1e3a8a]"></i>
                    <input type="password" id="funcSenha" maxlength="6" placeholder="Password" style="background-color: #b3cde0;"
                           class="w-full p-4 pl-14 pr-14 rounded-full text-left text-lg font-bold text-slate-800 outline-none placeholder:text-[#5c7da0] placeholder:italic">
                    
                    <button type="button" onclick="togglePassword()" class="absolute right-6 focus:outline-none text-[#1e3a8a] hover:text-blue-900">
                        <i id="eyeIcon" data-lucide="eye"></i>
                    </button>
                </div>

                <button onclick="registrar('entrada')" class="bg-[#013a63] hover:bg-[#01497c] text-white font-bold py-3 px-10 rounded-xl shadow-lg active:scale-95 transition-all">
                    Submit
                </button>
            </div>

            <div id="screenStatus" class="hidden">
                <h2 id="userNameDisplay" class="text-[#1e3a8a] font-extrabold text-lg mb-6">Hello! You're clocked in.</h2>
                
                <div class="status-card p-6 mb-8 grid grid-cols-2 gap-y-2 text-left shadow-inner">
                    <div>
                        <p id="userIdent" class="text-[#5c7da0] text-[10px] font-bold uppercase tracking-wider">ID #--</p>
                        <p class="text-[#1e3a8a] font-extrabold">Status: <span class="text-emerald-600">Working</span></p>
                    </div>
                    <div class="text-right">
                        <p id="userCargo" class="text-[#5c7da0] text-[10px] font-bold uppercase tracking-wider">Position</p>
                        <p id="userHours" class="text-[#1e3a8a] font-extrabold">00 hours</p>
                    </div>
                </div>

                <div class="flex justify-center gap-4">
                    <button onclick="registrar('intervalo')" class="bg-[#e9d502] hover:bg-yellow-500 text-[#011f4b] font-bold py-3 px-8 rounded-2xl shadow-md transition-all active:scale-95">
                        Break
                    </button>
                    <button onclick="registrar('saida')" class="bg-[#e57373] hover:bg-rose-500 text-white font-bold py-3 px-8 rounded-2xl shadow-md transition-all active:scale-95">
                        Clock Out
                    </button>
                </div>
            </div>
        </div>

        <div id="toast" class="hidden fixed bottom-10 right-10 bg-white p-5 rounded-3xl shadow-2xl border-l-8 border-blue-500 animate-bounce transition-all">
            <p id="toastMsg" class="text-[#011f4b] font-bold text-sm"></p>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3001";

        // Clock & Date Logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('dateText').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }, 1000);

        // Toggle Password Visibility
        function togglePassword() {
            const passInput = document.getElementById('funcSenha');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function registrar(tipo) {
            const id = document.getElementById('funcId').value;
            const senha = document.getElementById('funcSenha').value;

            if(!id || !senha) return showToast("Enter ID and Password!");

            try {
                const res = await fetch(`${API_URL}/ponto/${tipo}`, {
                    method: tipo === 'entrada' ? 'POST' : 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ funcionario_id: id, senha: senha })
                });
                
                const data = await res.json();
                
                if(res.ok || (res.status === 200 && data.erro)) {
                    if (data.nome) {
                        document.getElementById('userNameDisplay').innerText = `Hello, ${data.nome.split(' ')[0]}! You're clocked in.`;
                        document.getElementById('userCargo').innerText = data.cargo || "Employee";
                        document.getElementById('userIdent').innerText = `ID #${id}`;
                        document.getElementById('userHours').innerText = data.total_horas || "00 hours";
                    }

                    showToast(res.ok ? "Action registered!" : "Welcome back!");
                    
                    if(tipo === 'entrada' || (data.erro && data.erro.includes("active shift"))) {
                        toggleScreens(true);
                    }
                    
                    if(tipo === 'saida' && res.ok) resetUI();

                } else {
                    showToast(data.erro || "Error!");
                }
            } catch (e) { 
                showToast("Server Offline");
            }
        }

        function toggleScreens(isLoggedIn) {
            document.getElementById('screenLogin').classList.toggle('hidden', isLoggedIn);
            document.getElementById('screenStatus').classList.toggle('hidden', !isLoggedIn);
            document.getElementById('btnBack').classList.toggle('hidden', !isLoggedIn);
        }

        function resetUI() {
            toggleScreens(false);
            document.getElementById('funcId').value = '';
            document.getElementById('funcSenha').value = '';
            document.getElementById('funcSenha').type = 'password';
            lucide.createIcons();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        lucide.createIcons();
    </script>
</body>
</html>
