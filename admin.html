<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Clock - Admin Station</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f8fe; }
        .card-caixa {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .btn-primary { background-color: #011f4b; transition: all 0.2s; }
        .btn-primary:hover { background-color: #013a63; transform: translateY(-1px); }
        
        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-[#011f4b] tracking-tight">O'Clock - Admin Station</h1>
                <p class="text-slate-500 italic">Personnel and journey administration</p>
            </div>
            
            <button onclick="atualizarTudo()" class="group text-sm font-bold text-[#011f4b] hover:text-blue-800 flex items-center gap-2 bg-[#b3cde0] px-6 py-3 rounded-2xl transition-all">
                <i class="fa-solid fa-sync group-hover:animate-spin"></i>
                <span>Sync Now</span>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            
            <div class="card-caixa p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-3 bg-[#b3cde0] rounded-xl text-[#011f4b]">
                        <i class="fa-solid fa-user-plus text-xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-[#011f4b]">New Employee</h2>
                </div>
                <div class="space-y-4">
                    <input type="text" id="nome" placeholder="Full Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="cargo" placeholder="Role" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="salvar()" class="w-full btn-primary text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95">
                        Save to Database
                    </button>
                </div>
            </div>

            <div class="card-caixa p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-3 bg-emerald-100 rounded-xl text-emerald-600">
                        <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-[#011f4b]">Quick Query</h2>
                </div>
                <div class="flex gap-3 mb-6">
                    <input type="number" id="buscaId" placeholder="ID" class="w-24 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <button onclick="verRelatorio()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                        Generate Report
                    </button>
                </div>
                <div id="resultadoRelatorio" class="bg-slate-50 rounded-2xl p-6 min-h-[100px] text-sm text-slate-500 flex flex-col justify-center items-center border border-dashed border-slate-300">
                    Waiting for ID...
                </div>
            </div>
        </div>

        <div class="card-caixa p-8 mb-10">
            <div class="flex flex-col md:flex-row items-start md:items-center gap-6 mb-8">
                <div class="flex items-center gap-3">
                    <div class="p-3 bg-[#011f4b] rounded-xl text-white">
                        <i class="fa-solid fa-users text-lg"></i>
                    </div>
                    <h2 class="text-xl font-bold text-[#011f4b] whitespace-nowrap">Real-Time Monitoring</h2>
                </div>

                <div class="relative w-full md:max-w-md flex-1">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="inputBuscaRealTime" onkeyup="renderizarPainelFiltrado()" placeholder="Search by name or ID..." 
                        class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-all">
                </div>

                <div class="flex items-center gap-2 bg-rose-50 px-4 py-2 rounded-full border border-rose-100 ml-auto">
                    <span class="h-2 w-2 rounded-full bg-rose-600 animate-pulse"></span>
                    <span class="text-[10px] font-extrabold text-rose-600 uppercase tracking-widest">Live</span>
                </div>
            </div>
            <div id="listaEquipe" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div class="card-caixa p-8 opacity-60 hover:opacity-100 transition-opacity">
            <div class="flex items-center gap-3 mb-6">
                <div class="p-3 bg-slate-200 rounded-xl text-slate-600">
                    <i class="fa-solid fa-box-archive text-lg"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-500">Archived Personnel</h2>
            </div>
            <div id="listaArquivados" class="grid grid-cols-1 md:grid-cols-3 gap-4 italic text-sm"></div>
        </div>
    </div>

    <div id="modalStats" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div>
                    <h3 id="modalNomeFuncionario" class="text-xl font-bold text-slate-800">Stats</h3>
                    <p id="modalSubtitulo" class="text-xs text-slate-500 uppercase font-bold">Employee Performance</p>
                </div>
                <button onclick="document.getElementById('modalStats').classList.add('hidden')" class="text-slate-400 hover:text-rose-500 transition-colors">
                    <i class="fa-solid fa-circle-xmark text-2xl"></i>
                </button>
            </div>
            <div id="statsConteudo" class="p-8"></div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3001";
        let dadosEquipeOriginal = [];

        async function atualizarTudo() {
            await carregarPainel();
            await carregarArquivados();
        }

        async function carregarPainel() {
            try {
                const res = await fetch(`${API_URL}/ponto/painel-geral`);
                const data = await res.json();
                if(!res.ok) throw new Error("Load Error");

                dadosEquipeOriginal = data;
                renderizarPainelFiltrado();
            } catch (err) { 
                console.error("Error:", err);
                document.getElementById('listaEquipe').innerHTML = `<p class="text-rose-500 text-xs text-center col-span-full font-bold">Server Offline | Check Backend Connection</p>`;
            }
        }

        function renderizarPainelFiltrado() {
            const container = document.getElementById('listaEquipe');
            const termoBusca = document.getElementById('inputBuscaRealTime').value.toLowerCase();

            let filtrados = dadosEquipeOriginal.filter(f => 
                f.nome.toLowerCase().includes(termoBusca) || 
                f.id.toString() === termoBusca
            );

            const prioridade = { 'Working': 1, 'Lunch Break': 2, 'Away': 3 };
            filtrados.sort((a, b) => {
                if (prioridade[a.status] !== prioridade[b.status]) {
                    return prioridade[a.status] - prioridade[b.status];
                }
                return a.nome.localeCompare(b.nome);
            });

            container.innerHTML = filtrados.map(f => {
                let statusConfig = {
                    color: 'text-slate-400',
                    dot: 'bg-slate-300',
                    label: 'Away',
                    bg: 'bg-white border-slate-100'
                };

                if (f.status === 'Working') {
                    statusConfig = { color: 'text-emerald-600', dot: 'bg-emerald-500 animate-pulse', label: 'Working', bg: 'bg-emerald-50/10 border-emerald-100' };
                } else if (f.status === 'Lunch Break') {
                    statusConfig = { color: 'text-amber-600', dot: 'bg-amber-500 animate-bounce', label: 'On Break', bg: 'bg-amber-50/10 border-amber-100' };
                }

                return `
                    <div onclick="abrirDetalhesFuncionario(${f.id}, '${f.nome}')" 
                         class="group flex items-center justify-between p-5 ${statusConfig.bg} border rounded-3xl shadow-sm hover:border-blue-400 hover:shadow-md transition-all cursor-pointer">
                        <div>
                            <p class="font-bold text-[#011f4b] group-hover:text-blue-600 transition-colors">
                                ${f.nome} <span class="text-[10px] text-slate-300 font-normal ml-1">#${f.id}</span>
                            </p>
                            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tight">${f.cargo}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="event.stopPropagation(); desligar(${f.id})" 
                                    class="opacity-0 group-hover:opacity-100 text-rose-300 hover:text-rose-600 transition-all p-2 bg-rose-50 rounded-xl">
                                <i class="fa-solid fa-user-xmark"></i>
                            </button>
                            <div class="flex flex-col items-end min-w-[65px]">
                                <span class="h-2.5 w-2.5 rounded-full ${statusConfig.dot}"></span>
                                <span class="text-[9px] font-black uppercase mt-1 px-2 py-0.5 rounded-full ${statusConfig.color}">
                                    ${statusConfig.label}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<p class="text-slate-400 text-xs col-span-full text-center py-4">No results found.</p>';
        }

        async function salvar() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const cargo = document.getElementById('cargo').value;
            
            if(!nome || !cargo || !email) return alert("Please fill all fields!");

            try {
                const res = await fetch(`${API_URL}/ponto/funcionarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, cargo })
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert(`SUCCESS!\nID: ${data.id}\nTEMP PASS: ${data.senha}`);
                    document.getElementById('nome').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('cargo').value = '';
                    atualizarTudo();
                }
            } catch(e) { alert("Error saving employee."); }
        }

        async function abrirDetalhesFuncionario(id, nome) {
            document.getElementById('modalNomeFuncionario').innerText = nome;
            document.getElementById('modalStats').classList.remove('hidden');
            document.getElementById('statsConteudo').innerHTML = '<div class="flex justify-center py-10"><i class="fa-solid fa-spinner animate-spin text-3xl text-blue-500"></i></div>';
            
            try {
                const res = await fetch(`${API_URL}/ponto/relatorio/${id}`);
                const data = await res.json();
                
                document.getElementById('statsConteudo').innerHTML = `
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-blue-50 border border-blue-100 p-5 rounded-3xl">
                            <p class="text-blue-600 text-[10px] font-bold uppercase mb-1">Monthly Hours</p>
                            <p class="text-3xl font-black text-[#011f4b]">${data.total_mes || '00h 00m'}</p>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 p-5 rounded-3xl">
                            <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Status</p>
                            <p class="text-xl font-bold text-slate-800">${data.esta_ativo ? 'Active' : 'Inactive'}</p>
                        </div>
                    </div>
                    <h4 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Recent Activity</h4>
                    <div class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scroll">
                        ${data.historico && data.historico.length > 0 ? data.historico.map(h => `
                            <div class="flex justify-between items-center p-4 bg-white border border-slate-100 rounded-2xl">
                                <span class="text-sm text-slate-600 font-medium">${new Date(h.entrada).toLocaleDateString()}</span>
                                <span class="bg-emerald-50 text-emerald-700 font-bold text-xs px-3 py-1 rounded-lg border border-emerald-100">${h.duracao_formatada}</span>
                            </div>
                        `).join('') : '<p class="text-center text-slate-400 text-sm italic">No records found.</p>'}
                    </div>
                `;
            } catch (err) {
                document.getElementById('statsConteudo').innerHTML = '<p class="text-rose-500">Error loading data.</p>';
            }
        }

        async function desligar(id) {
            if(!confirm("Are you sure you want to terminate this employee?")) return;
            try {
                const res = await fetch(`${API_URL}/ponto/funcionarios/desligar/${id}`, { method: 'PATCH' });
                if(res.ok) { 
                    alert("Employee archived successfully.");
                    atualizarTudo(); 
                }
            } catch (err) { alert("Error connecting to server."); }
        }

        async function verRelatorio() {
            const id = document.getElementById('buscaId').value;
            if(!id) return;
            const div = document.getElementById('resultadoRelatorio');
            div.innerHTML = '<i class="fa-solid fa-spinner animate-spin text-emerald-500"></i>';
            try {
                const res = await fetch(`${API_URL}/ponto/relatorio/${id}`);
                const data = await res.json();
                if (res.ok) {
                    const statusLabel = data.esta_ativo ? 'Active' : 'Archived';
                    const statusClass = data.esta_ativo ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-slate-200 text-slate-600 border-slate-300';

                    div.innerHTML = `
                        <div class="w-full text-left">
                            <div class="flex justify-between items-start mb-2">
                                <p class="font-bold text-[#011f4b] text-lg leading-tight">${data.funcionario}</p>
                                <span class="text-[9px] font-black uppercase px-2 py-1 rounded-lg border ${statusClass}">${statusLabel}</span>
                            </div>
                            <p class="text-blue-600 font-black text-2xl">${data.total_mes || '00h 00m'}</p>
                            <span class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Total this month</span>
                        </div>`;
                } else { div.innerHTML = `<span class="text-rose-500 font-bold">Not found</span>`; }
            } catch (e) { div.innerHTML = `<span class="text-rose-500 font-bold">Error</span>`; }
        }

        async function carregarArquivados() {
            try {
                const res = await fetch(`${API_URL}/ponto/funcionarios/arquivados`);
                const data = await res.json();
                const container = document.getElementById('listaArquivados');
                container.innerHTML = data.map(f => `
                    <div class="flex items-center justify-between p-3 bg-slate-100 rounded-2xl border border-slate-200">
                        <span class="text-slate-600 font-medium">${f.nome}</span>
                        <span class="text-[9px] bg-slate-200 px-2 py-1 rounded-lg uppercase font-bold text-slate-400">Inactive</span>
                    </div>
                `).join('') || '<p class="text-slate-400 text-xs">No archived employees.</p>';
            } catch (e) { console.error(e); }
        }

        atualizarTudo();
        setInterval(atualizarTudo, 30000);
    </script>
</body>
</html>
