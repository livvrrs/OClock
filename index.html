<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Station - Estação de Ponto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Glassmorphism effect | Efeito de Vidro */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 h-screen flex items-center justify-center p-4">

    <div class="glass border border-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
        <div class="mb-8">
            <span class="bg-blue-100 text-blue-600 text-xs font-extrabold px-3 py-1 rounded-full uppercase tracking-tighter">
                Time Station | Estação de Registro
            </span>
            <div id="clock" class="text-5xl font-extrabold text-slate-800 mt-4 tracking-tighter">00:00:00</div>
            <p id="dateText" class="text-slate-400 text-sm mt-1 uppercase font-semibold tracking-widest"></p>
        </div>
        
        <div id="boasVindas" class="mb-8 h-16 flex items-center justify-center transition-all duration-300">
            <p class="text-slate-500 font-medium italic">Waiting for ID... | Aguardando identificação...</p>
        </div>

        <div class="relative group mb-8">
            <input type="number" id="funcId" oninput="buscarFuncionario()" placeholder="Enter your ID | Seu ID" 
                   class="w-full p-6 bg-slate-100/50 border-2 border-transparent rounded-2xl text-center text-3xl font-bold text-slate-800 focus:bg-white focus:border-blue-500 focus:ring-0 outline-none transition-all placeholder:text-slate-300">
        </div>

        <div id="botoesAcao" class="grid grid-cols-2 gap-4 opacity-10 pointer-events-none transition-all duration-500 scale-95">
            <button onclick="registrar('entrada')" class="group relative overflow-hidden bg-emerald-500 p-5 rounded-2xl shadow-lg shadow-emerald-200 active:scale-95 transition-all">
                <span class="relative z-10 text-white font-extrabold tracking-tight uppercase">Clock In | Entrada</span>
                <div class="absolute inset-0 bg-gradient-to-tr from-emerald-600 to-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
            <button onclick="registrar('saida')" class="group relative overflow-hidden bg-rose-500 p-5 rounded-2xl shadow-lg shadow-rose-200 active:scale-95 transition-all">
                <span class="relative z-10 text-white font-extrabold tracking-tight uppercase">Clock Out | Saída</span>
                <div class="absolute inset-0 bg-gradient-to-tr from-rose-600 to-rose-400 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
        </div>

        <div id="mensagem" class="mt-8 p-4 rounded-2xl hidden text-sm font-bold animate-in fade-in zoom-in duration-300"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:3001";

        /** * Clock and Date Update | Atualização de Relógio e Data
         */
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('dateText').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);

        /**
         * Live search for employee ID | Busca dinâmica do ID do funcionário
         */
        async function buscarFuncionario() {
            const id = document.getElementById('funcId').value;
            const welcome = document.getElementById('boasVindas');
            const botoes = document.getElementById('botoesAcao');

            if (id.length > 0) {
                try {
                    const res = await fetch(`${API_URL}/ponto/relatorio/${id}`);
                    const data = await res.json();
                    if (res.ok) {
                        welcome.innerHTML = `<div class="animate-bounce"><h2 class="text-2xl font-extrabold text-blue-600">Hello, ${data.funcionario.split(' ')[0]}!</h2><p class="text-slate-400 text-xs">Ready to record? | Pronto para registrar?</p></div>`;
                        botoes.classList.remove('opacity-10', 'pointer-events-none', 'scale-95');
                    } else {
                        welcome.innerHTML = `<p class="text-rose-400 font-medium">Unknown ID | ID inexistente</p>`;
                        botoes.classList.add('opacity-10', 'pointer-events-none', 'scale-95');
                    }
                } catch (e) { console.error("Search Error:", e); }
            } else {
                welcome.innerHTML = `<p class="text-slate-500 font-medium italic">Waiting... | Aguardando...</p>`;
                botoes.classList.add('opacity-10', 'pointer-events-none', 'scale-95');
            }
        }

        /**
         * Records Clock-in or Clock-out | Registra Entrada ou Saída
         * @param {string} tipo - 'entrada' or 'saida'
         */
        async function registrar(tipo) {
            const id = document.getElementById('funcId').value;
            const msgDiv = document.getElementById('mensagem');
            try {
                const res = await fetch(`${API_URL}/ponto/${tipo}`, {
                    method: tipo === 'entrada' ? 'POST' : 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ funcionario_id: id })
                });
                const data = await res.json();
                
                // Styling feedback based on success or error | Estilizando feedback
                msgDiv.className = `mt-8 p-4 rounded-2xl font-bold ${res.ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-rose-50 text-rose-700 border border-rose-100'}`;
                msgDiv.innerText = res.ok ? `Success! ${tipo} recorded. | Sucesso!` : data.erro;
                msgDiv.classList.remove('hidden');

                // Auto-reload to clear data after 3 seconds | Recarrega após 3 segundos
                setTimeout(() => location.reload(), 3000);
            } catch (e) { alert("Connection error | Erro de conexão"); }
        }
    </script>
</body>
</html>
